<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Tempo</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Poppins:wght@400;700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="js/script.js" defer></script>
</head>

<body>

    <div class="container">

        <div class="form">
            <h3>Confira o clima de uma cidade:</h3>

            <div class="form-input-container">
                <input type="text" placeholder="Digite o nome da cidade..." id="city-input">

                <button id="search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div id="loading" class="hide">
                <div class="spinner"></div>
            </div>

            <p id="error-message"></p>
        </div>

        <div id="weather-data" class="hide">

            <h2>
                <i class="fa-solid fa-location-dot"></i>
                <span id="city"></span>
                <img src="" alt="Bandeira do país" id="country">
            </h2>

            <p id="temperature">
                <span></span>&deg;C
            </p>

            <div id="description-container">
                <p id="description"></p>
                <img src="" alt="Condições do tempo" id="weather-icon">
            </div>

            <div id="details-container">

                <div class="row">
                    <p id="umidity">
                        <i class="fa-solid fa-droplet"></i>
                        <span></span>
                    </p>

                    <p id="wind">
                        <i class="fa-solid fa-wind"></i>
                        <span></span>
                    </p>
                </div>

                <p id="local-time">
                    <i class="fa-solid fa-clock"></i>
                    <span></span>
                </p>

            </div>

        </div>

        <div id="container-forecast" class="hide">
            <h2 id="forecast-titulo">Previsão para os próximos 5 dias</h2>
            <div id="forecast-cards">
            </div>
        </div>

    </div>

</body>

</html>
